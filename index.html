<!DOCTYPE html>
<html>
<head>
    <title>Flask-Render Frontend</title>
</head>
<body>
    <h1>Frontend in Github</h1>
    <button onclick="callAPI()">Send requests to Backend</button>
    <p id="response"></p>

    <script>
        async function callAPI() {
            // THAY URL NÀY BẰNG URL RENDER CỦA BẠN
            const backendUrl = "https://test16mar26-1.onrender.com";
            
            try {
                const res = await fetch(backendUrl);
                const data = await res.json();
                document.getElementById("response").innerText = data.message;
            } catch (err) {
                console.error("Error connect:", err);
            }
        }
    </script>
</body>
</html>
